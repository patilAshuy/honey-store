version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
  env_file:
    - .env.local

  environment:
    - NODE_ENV=production
  restart: always

  # Local development database if not using Supabase cloud
  db:
    image: postgres:17.5
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=honeyuser
      - POSTGRES_PASSWORD=honeypass
      - POSTGRES_DB=honeystore
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
