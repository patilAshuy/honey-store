version: '3.8'

services:

  php:
    build: .
    container_name: honey_php

    ports:
      - "8081:80"

    volumes:
      - ./:/var/www/html

    depends_on:
      - mysql

  mysql:
    image: mysql:8.0

    container_name: honey_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: honey_store

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data:
